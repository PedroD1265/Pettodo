name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          FIREBASE_PROJECT_ID: ci-project
          FIREBASE_CLIENT_EMAIL: ci@ci.iam.gserviceaccount.com
          # CI-only dummy secret — NOT a real Firebase credential.
          # Set CI_FIREBASE_PRIVATE_KEY_DUMMY in GitHub Actions secrets to any
          # non-PEM placeholder string (e.g. "ci-dummy-not-a-real-key").
          # server/firebaseAdmin.ts reads this at module load time but the
          # hasCredentials guard prevents actual Firebase Admin SDK initialisation
          # when the value is absent or not a real PEM key.
          FIREBASE_PRIVATE_KEY: ${{ secrets.CI_FIREBASE_PRIVATE_KEY_DUMMY }}

      - name: Test
        run: npm test
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          FIREBASE_PROJECT_ID: ci-project
          FIREBASE_CLIENT_EMAIL: ci@ci.iam.gserviceaccount.com
          # CI-only dummy secret — NOT a real Firebase credential.
          # All tests mock server/firebaseAdmin.js via vi.mock(), so this value
          # is never passed to the Firebase Admin SDK.
          FIREBASE_PRIVATE_KEY: ${{ secrets.CI_FIREBASE_PRIVATE_KEY_DUMMY }}